<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Electorales</title>

<style>
body{
  font-family: system-ui;
  background:#f5f5f3;
  margin:0;
  padding:20px;
  color:#1a1a18;
}

.container{
  max-width:900px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.title{
  font-size:22px;
  font-weight:500;
}

.sub{
  font-size:13px;
  color:#5f5e5a;
}

.card{
  background:#fff;
  border:0.5px solid #e0dfd8;
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
}

.bar{
  height:10px;
  background:#eee;
  border-radius:6px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  transition:0.5s;
}

.cand{
  display:flex;
  gap:12px;
  align-items:center;
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
  border:0.5px solid #ddd;
}

.name{
  font-weight:500;
  font-size:14px;
}

.party{
  font-size:12px;
  color:#666;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:15px 0;
}

.stat{
  background:#fff;
  border:0.5px solid #e0dfd8;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.stat b{
  display:block;
  font-size:16px;
  margin-top:4px;
}

.boletin{
  font-size:13px;
  padding:8px 0;
  border-bottom:0.5px solid #eee;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title" id="title">Resultados electorales</div>
    <div class="sub" id="sub"></div>
  </div>

  <div class="stats">
    <div class="stat">
      Padrón
      <b id="padron">—</b>
    </div>
    <div class="stat">
      Votos
      <b id="votos">—</b>
    </div>
    <div class="stat">
      Participación
      <b id="part">—</b>
    </div>
  </div>

  <div id="list"></div>

  <div class="card" id="boletines" style="display:none"></div>

</div>

<script>
const STORAGE_KEY = 'electoral_data_v1';

let data = null;

async function load(){
  const r = await window.storage.get(STORAGE_KEY, true);
  if(!r || !r.value) return;

  data = JSON.parse(r.value);
  render();
}

function render(){

  if(!data) return;

  document.getElementById("title").innerText = data.titulo || "Resultados electorales";

  const totalVotos = data.totalVotos || 0;
  const padron = data.padron || 0;

  document.getElementById("padron").innerText = Number(padron).toLocaleString("es-CL");
  document.getElementById("votos").innerText = Number(totalVotos).toLocaleString("es-CL");

  const part = padron ? ((totalVotos/padron)*100).toFixed(1)+"%" : "—";
  document.getElementById("part").innerText = part;

  let max = 0;
  (data.candidates||[]).forEach(c=>{
    max = Math.max(max, Number(c.pct)||0);
  });

  const list = document.getElementById("list");
  list.innerHTML = "";

  (data.candidates||[]).forEach((c,i)=>{

    const pct = Number(c.pct)||0;
    const color = ["#378ADD","#D85A30","#1D9E75","#D4537E","#7F77DD","#639922"][i%6];

    list.innerHTML += `
      <div class="card">
        <div class="cand">
          ${c.img?`<img class="avatar" src="${c.img}">`:"<div class='avatar'></div>"}
          <div style="flex:1">
            <div class="name">${c.name||"Sin nombre"}</div>
            <div class="party">${c.party||""}</div>

            <div class="bar">
              <div class="fill" style="width:${pct}%;background:${color}"></div>
            </div>

            <div style="font-size:12px;color:#666;margin-top:4px">
              ${Number(c.votos||0).toLocaleString("es-CL")} votos · ${pct.toFixed(3).replace(".",",")}%
            </div>

          </div>
        </div>
      </div>
    `;
  });

  if(data.boletines && data.boletines.length){
    const b = data.boletines.filter(x=>x.texto);
    if(b.length){
      document.getElementById("boletines").style.display="block";
      document.getElementById("boletines").innerHTML =
        "<b>Actualizaciones</b><br><br>" +
        b.reverse().map(x=>`<div class="boletin">${x.texto}</div>`).join("");
    }
  }

}

load();
</script>

</body>
</html>
