<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC = db.collection("elections").doc("generic");
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Electoral</title>

<style>
/* ====== TU CSS ORIGINAL (SIN CAMBIOS IMPORTANTES) ====== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#f5f5f3;color:#1a1a18}
.app{max-width:900px;margin:auto;padding:1.5rem 1rem}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:1rem;margin-bottom:1rem}
.field{margin-bottom:10px}
input{width:100%;padding:8px;border:1px solid #ccc;border-radius:8px}
button{cursor:pointer}
.save-btn{background:#1a1a18;color:#fff;padding:10px;border:none;width:100%;border-radius:8px}
.tab-btns button{margin-right:6px}
.tab-btn.active{background:#1a1a18;color:#fff}
.pub-candidate{padding:10px;border:1px solid #ddd;border-radius:10px;margin-bottom:8px}
.bar-wrap{height:8px;background:#eee;border-radius:5px}
.bar-fill{height:100%}
</style>
</head>

<body>

<div class="app">

  <div class="tab-btns">
    <button onclick="showTab('admin')" class="tab-btn active">Admin</button>
    <button onclick="showTab('preview')" class="tab-btn">Vista pública</button>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="section active">

    <div class="card">
      <h2>Información</h2>
      <input id="titulo" placeholder="Título">
      <input id="padron" type="number" placeholder="Padrón">
      <input id="total-votos" type="number" placeholder="Votos">
      <input id="mesas-pct" type="number" placeholder="Mesas %">
      <input id="ultima-act" type="datetime-local">
    </div>

    <div class="card">
      <h2>Candidatos</h2>
      <div id="candidate-list"></div>
      <button onclick="addCandidate()">+ Agregar</button>
    </div>

    <button class="save-btn" onclick="saveData()">Guardar</button>
  </div>

  <!-- PUBLIC -->
  <div id="preview" class="section">
    <div id="pub"></div>
  </div>

</div>

<script>
let data = {titulo:"",padron:"",totalVotos:0,mesasPct:0,ultimaAct:"",candidates:[]};

async function loadData(){
  try{
    const doc = await DOC.get();
    if(doc.exists) data = doc.data();
  }catch(e){}
  renderAdmin();
  renderPublic();
}

function renderAdmin(){
  document.getElementById("titulo").value = data.titulo || "";
  document.getElementById("padron").value = data.padron || "";
  document.getElementById("total-votos").value = data.totalVotos || "";
  document.getElementById("mesas-pct").value = data.mesasPct || "";
  document.getElementById("ultima-act").value = data.ultimaAct || "";

  const list = document.getElementById("candidate-list");
  list.innerHTML = "";

  (data.candidates || []).forEach((c,i)=>{
    list.innerHTML += `
      <div>
        <input id="name-${i}" value="${c.name||""}" placeholder="Nombre">
        <input id="votes-${i}" type="number" value="${c.votos||0}" placeholder="Votos">
      </div>
    `;
  });
}

function collect(){
  data.titulo = titulo.value;
  data.padron = Number(padron.value||0);
  data.totalVotos = Number(total-votos.value||0);
  data.mesasPct = Number(mesas-pct.value||0);
  data.ultimaAct = ultima-act.value;

  (data.candidates||[]).forEach((c,i)=>{
    c.name = document.getElementById(`name-${i}`)?.value || "";
    c.votos = Number(document.getElementById(`votes-${i}`)?.value || 0);
  });

  let total = data.candidates.reduce((a,b)=>a+(b.votos||0),0);

  data.candidates.forEach(c=>{
    c.pct = total ? ((c.votos/total)*100).toFixed(3) : "0.000";
  });

  data.totalVotos = total;
}

async function saveData(){
  collect();
  try{
    await DOC.set(data);
    renderPublic();
    alert("Guardado correctamente");
  }catch(e){
    alert("Error: "+e.message);
  }
}

function addCandidate(){
  data.candidates.push({name:"",votos:0,pct:"0.000"});
  renderAdmin();
}

function renderPublic(){
  const el = document.getElementById("pub");
  if(!data.candidates.length){
    el.innerHTML = "Sin datos";
    return;
  }

  let html = "";
  data.candidates.forEach(c=>{
    html += `
      <div class="pub-candidate">
        <b>${c.name}</b><br>
        ${c.votos} votos - ${c.pct}%
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${c.pct}%;background:#378ADD"></div>
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
}

function showTab(t){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(t).classList.add("active");
}

loadData();
</script>

</body>
</html>
